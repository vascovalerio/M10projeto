openapi: 3.0.0
info:
  title: Ticket Manager API
  description: REST API for ticket management using ITSM data schema
  version: 2.0.0
  contact:
    name: API Support
    email: support@example.com

servers:
  - url: http://localhost:3000
    description: Development server

paths:
  /health:
    get:
      summary: Health check
      description: Returns server health status and configuration
      tags:
        - Health
      responses:
        '200':
          description: Server is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                    example: Server is running
                  port:
                    type: integer
                    example: 3000
                  timestamp:
                    type: string
                    format: date-time
                    example: 2026-01-29T10:00:00.000Z
                  uptime:
                    type: string
                    example: 5 minutes 30 seconds
                  memory:
                    type: object
                    properties:
                      heapUsed:
                        type: string
                        example: 25 MB
                      heapTotal:
                        type: string
                        example: 50 MB
                      rss:
                        type: string
                        example: 60 MB

  /api/auth/register:
    post:
      summary: Registar utilizador
      description: Cria um utilizador e guarda a password com hash bcrypt e sal único.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  example: "Password@123"
      responses:
        '201':
          description: Utilizador criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email já registado

  /api/auth/login:
    post:
      summary: Login
      description: Verifica a password (hash), devolve JWT de acesso e define refresh token em cookie HttpOnly.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  expiresAt:
                    type: string
                    format: date-time
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Credenciais inválidas
        '429':
          description: IP bloqueado temporariamente (proteção brute-force)

  /api/auth/refresh:
    post:
      summary: Refresh de token
      description: Usa o cookie `refresh_token` para emitir um novo JWT de acesso.
      tags:
        - Auth
      responses:
        '200':
          description: Token renovado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  accessToken:
                    type: string
                  expiresAt:
                    type: string
                    format: date-time
        '401':
          description: Refresh token inválido/expirado/ausente

  /api/auth/me:
    get:
      summary: Utilizador autenticado
      tags:
        - Auth
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Dados do utilizador
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Não autenticado

  /api/auth/logout:
    post:
      summary: Logout
      tags:
        - Auth
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logout com sucesso
        '401':
          description: Não autenticado

  /system/audit-logs:
    get:
      summary: Listar rastos de auditoria
      description: Devolve eventos de auditoria (admin only).
      tags:
        - System
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 500
          description: Número máximo de registos devolvidos
      responses:
        '200':
          description: Lista de logs de auditoria
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        user_id:
                          type: integer
                          nullable: true
                        action:
                          type: string
                        result:
                          type: string
                          enum: [SUCCESS, FAIL]
                        details:
                          type: object
                        created_at:
                          type: string
                          format: date-time
        '401':
          description: Não autenticado
        '403':
          description: Sem permissões (não admin)

  /api/tickets:
    get:
      summary: List tickets
      description: Retrieves a list of tickets with optional filtering, pagination, and sorting
      tags:
        - Tickets
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
          description: Filter by ticket status (e.g., Open, Closed)
        - in: query
          name: priority
          schema:
            type: string
          description: Filter by priority level (1, 2, 3, 4, 5, NS, NA)
        - in: query
          name: category
          schema:
            type: string
          description: Filter by category (e.g., incident, request for information)
        - in: query
          name: id
          schema:
            type: integer
          description: Filter by ticket ID (e.g., 4)
        - in: query
          name: search
          schema:
            type: string
          description: Search in title and description
        - in: query
          name: limit
          schema:
            type: integer
            default: 100
            maximum: 1000
          description: Maximum number of results
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
          description: Number of records to skip (pagination)
        - in: query
          name: sortBy
          schema:
            type: string
            default: created_at
            enum: [id, title, status, priority, category, created_at, updated_at]
          description: Field to sort by
        - in: query
          name: sortOrder
          schema:
            type: string
            default: DESC
            enum: [ASC, DESC]
          description: Sort order
      responses:
        '200':
          description: List of tickets with pagination info
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Ticket'
                  pagination:
                    type: object
                    properties:
                      total:
                        type: integer
                        example: 150
                      limit:
                        type: integer
                        example: 10
                      offset:
                        type: integer
                        example: 0
                      hasMore:
                        type: boolean
                        example: true
    post:
      summary: Create ticket
      description: Creates a new ticket
      tags:
        - Tickets
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 255
                  example: SUB000501
                  description: Ticket title (from CI_Name in ITSM data)
                description:
                  type: string
                  maxLength: 5000
                  example: subapplication
                  description: Ticket description (from CI_Cat in ITSM data)
                priority:
                  type: string
                  default: '3'
                  example: '4'
                  description: Priority level (1, 2, 3, 4, 5, NS, NA)
                category:
                  type: string
                  default: incident
                  example: incident
                  description: Ticket category
                impact:
                  type: string
                  example: '3'
                  description: Impact level (1, 2, 3, 4, 5, NS)
                urgency:
                  type: string
                  example: '3'
                  description: Urgency level (1, 2, 3, 4, 5, NS)
      responses:
        '201':
          description: Ticket created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/tickets/{id}:
    get:
      summary: Get ticket by ID
      description: Retrieves a single ticket by its id
      tags:
        - Tickets
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Ticket ID (e.g., 4)
      responses:
        '200':
          description: Ticket found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
        '404':
          description: Ticket not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Update ticket
      description: Updates an existing ticket
      tags:
        - Tickets
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Ticket ID (e.g., 4)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 255
                description:
                  type: string
                  maxLength: 5000
                status:
                  type: string
                  example: Closed
                priority:
                  type: string
                  example: '4'
                category:
                  type: string
                  example: incident
                impact:
                  type: string
                  example: '3'
                urgency:
                  type: string
                  example: '3'
      responses:
        '200':
          description: Ticket updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
        '404':
          description: Ticket not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete ticket
      description: Permanently deletes a ticket
      tags:
        - Tickets
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Ticket ID (e.g., 4)
      responses:
        '200':
          description: Ticket deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Ticket deleted successfully
                  id:
                    type: integer
                    example: 4
        '404':
          description: Ticket not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/stats/summary:
    get:
      summary: Get ticket statistics summary
      description: Returns comprehensive statistics about all tickets
      tags:
        - Statistics
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Statistics summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    example: 150
                  byStatus:
                    type: object
                    additionalProperties:
                      type: integer
                    example:
                      Open: 45
                      Closed: 105
                  byPriority:
                    type: object
                    additionalProperties:
                      type: integer
                    example:
                      '1': 10
                      '2': 20
                      '3': 50
                      '4': 40
                      '5': 30
                  byCategory:
                    type: object
                    additionalProperties:
                      type: integer
                    example:
                      incident: 100
                      request for information: 30
                      request for change: 20
                  percentages:
                    type: object
                    properties:
                      byStatus:
                        type: object
                        additionalProperties:
                          type: string
                      byPriority:
                        type: object
                        additionalProperties:
                          type: string
                      byCategory:
                        type: object
                        additionalProperties:
                          type: string

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: user@example.com
        created_at:
          type: string
          format: date-time
    Ticket:
      type: object
      properties:
        id:
          type: integer
          example: 4
          description: Unique ticket identifier from ITSM data
        title:
          type: string
          example: SUB000501
          description: Ticket title (from CI_Name in ITSM data)
        description:
          type: string
          example: subapplication
          description: Ticket description (from CI_Cat in ITSM data)
        status:
          type: string
          example: Open
          description: Ticket status (Open, Closed)
        priority:
          type: string
          example: '4'
          description: Priority level (1, 2, 3, 4, 5, NS, NA)
        category:
          type: string
          example: incident
          description: Ticket category
        impact:
          type: string
          nullable: true
          example: '4'
          description: Impact level (1, 2, 3, 4, 5, NS)
        urgency:
          type: string
          nullable: true
          example: '3'
          description: Urgency level (1, 2, 3, 4, 5, NS)
        created_at:
          type: string
          format: date-time
          nullable: true
          example: 2013-08-21T11:20:00.000Z
          description: When the ticket was opened (from Open_Time)
        resolved_at:
          type: string
          format: date-time
          nullable: true
          example: 2013-10-01T16:38:00.000Z
          description: When the ticket was resolved (from Resolved_Time)
        closed_at:
          type: string
          format: date-time
          nullable: true
          example: 2013-10-01T16:38:00.000Z
          description: When the ticket was closed (only present when status is Closed)
        updated_at:
          type: string
          format: date-time
          example: 2013-10-01T16:38:00.000Z
      description: Ticket object with conditional field visibility

    Error:
      type: object
      properties:
        error:
          type: string
          example: Validation Error
        message:
          type: string
          example: Title is required

tags:
  - name: Health
    description: Server health and status
  - name: Auth
    description: Registo, login e sessões
  - name: Tickets
    description: Ticket CRUD operations using ITSM schema
  - name: Statistics
    description: Ticket statistics and analytics
